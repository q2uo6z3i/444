<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>Mini Smash Game</title>
<style>
body { margin:0; overflow:hidden; background:#222; }
canvas { display:block; background:#87ceeb; }
#info {
  position:absolute; top:10px; left:10px; color:white; font-family:sans-serif;
}
</style>
</head>
<body>
<div id="info">A,D:移動 / W:ジャンプ / F:攻撃</div>
<canvas id="game"></canvas>
<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let keys = {};
document.addEventListener("keydown", e => keys[e.key.toLowerCase()] = true);
document.addEventListener("keyup", e => keys[e.key.toLowerCase()] = false);

class Player {
  constructor(x,color) {
    this.x = x;
    this.y = canvas.height - 100;
    this.vx = 0;
    this.vy = 0;
    this.width = 40;
    this.height = 60;
    this.color = color;
    this.onGround = false;
    this.hp = 0;
  }

  update() {
    // 移動
    if(keys['a']) this.vx = -5;
    else if(keys['d']) this.vx = 5;
    else this.vx *= 0.8;

    // ジャンプ
    if(keys['w'] && this.onGround) {
      this.vy = -15;
      this.onGround = false;
    }

    // 重力
    this.vy += 0.8;

    this.x += this.vx;
    this.y += this.vy;

    // 地面
    if(this.y + this.height > canvas.height - 20) {
      this.y = canvas.height - 20 - this.height;
      this.vy = 0;
      this.onGround = true;
    }
  }

  draw() {
    ctx.fillStyle = this.color;
    ctx.fillRect(this.x,this.y,this.width,this.height);
  }
}

class Enemy {
  constructor() {
    this.x = canvas.width - 100;
    this.y = canvas.height - 100;
    this.width = 40;
    this.height = 60;
    this.color = "red";
    this.vx = 2;
    this.hp = 0;
  }

  update(player) {
    // 簡単AI
    if(player.x < this.x) this.vx = -2;
    else this.vx = 2;

    this.x += this.vx;
  }

  draw() {
    ctx.fillStyle = this.color;
    ctx.fillRect(this.x,this.y,this.width,this.height);
  }
}

const player = new Player(100,"blue");
const enemy = new Enemy();

function attack() {
  let range = 50;
  if(Math.abs(player.x - enemy.x) < range) {
    enemy.hp += 10;
  }
}

document.addEventListener("keydown", e => {
  if(e.key.toLowerCase() === 'f') attack();
});

function drawHP() {
  ctx.fillStyle = "white";
  ctx.fillText("Enemy Damage: " + enemy.hp, 20, 40);
}

function gameLoop() {
  ctx.clearRect(0,0,canvas.width,canvas.height);

  // 地面
  ctx.fillStyle = "green";
  ctx.fillRect(0, canvas.height-20, canvas.width, 20);

  player.update();
  enemy.update(player);

  player.draw();
  enemy.draw();

  drawHP();

  requestAnimationFrame(gameLoop);
}

gameLoop();
</script>
</body>
</html>
