<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>Mini Smash Game 最終強化</title>
<style>
body { margin:0; overflow:hidden; background:#222; font-family:sans-serif; }
canvas { display:none; background:#87ceeb; }
#menu { color:white; text-align:center; padding-top:50px; }
button { margin:5px; padding:10px 20px; font-size:16px; }
</style>
</head>
<body>
<div id="menu">
  <h1>キャラクター選択</h1>
  <p>プレイヤーを選択</p>
  <div id="playerSelect"></div>
  <p>敵を選択</p>
  <div id="enemySelect"></div>
  <br>
  <button onclick="startGame()">ゲーム開始</button>
</div>
<canvas id="game"></canvas>
<script>
const animals = [
  {name:"ネコ", emoji:"🐱"},
  {name:"イヌ", emoji:"🐶"},
  {name:"ウサギ", emoji:"🐰"},
  {name:"トラ", emoji:"🐯"},
  {name:"パンダ", emoji:"🐼"},
  {name:"キツネ", emoji:"🦊"},
  {name:"クマ", emoji:"🐻"},
  {name:"カエル", emoji:"🐸"},
  {name:"サル", emoji:"🐵"},
  {name:"ライオン", emoji:"🦁"}
];

let selectedPlayer = 0;
let selectedEnemy = 1;

const playerDiv = document.getElementById("playerSelect");
const enemyDiv = document.getElementById("enemySelect");

animals.forEach((a,i)=>{
  let b1 = document.createElement("button");
  b1.textContent = a.emoji + " " + a.name;
  b1.onclick = ()=> selectedPlayer = i;
  playerDiv.appendChild(b1);

  let b2 = document.createElement("button");
  b2.textContent = a.emoji + " " + a.name;
  b2.onclick = ()=> selectedEnemy = i;
  enemyDiv.appendChild(b2);
});

const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let keys = {};
document.addEventListener("keydown", e => keys[e.key.toLowerCase()] = true);
document.addEventListener("keyup", e => keys[e.key.toLowerCase()] = false);

class Fighter {
  constructor(x, data) {
    this.x = x;
    this.y = canvas.height - 100;
    this.vx = 0;
    this.vy = 0;
    this.size = 40;
    this.emoji = data.emoji;
    this.name = data.name;
    this.onGround = false;
    this.hp = 100;
    this.hitTimer = 0;
    this.attackTimer = 0;
    this.attackType = "";
    this.dodgeTimer = 0;
  }

  physics() {
    this.vy += 0.8;
    this.x += this.vx;
    this.y += this.vy;

    if(this.y + this.size > canvas.height - 20) {
      this.y = canvas.height - 20 - this.size;
      this.vy = 0;
      this.onGround = true;
    }

    if(this.hitTimer > 0) this.hitTimer--;
    if(this.attackTimer > 0) this.attackTimer--;
    if(this.dodgeTimer > 0) this.dodgeTimer--;
  }

  draw() {
    ctx.font = "40px serif";

    if(this.dodgeTimer > 0) ctx.globalAlpha = 0.5;
    else ctx.globalAlpha = 1;

    ctx.fillText(this.emoji, this.x, this.y);
    ctx.globalAlpha = 1;

    if(this.attackTimer > 0) {
      ctx.fillStyle = this.attackType === "strong" ? "red" : "orange";
      ctx.fillRect(this.x + 30, this.y-30, 30, 20);
    }
  }
}

let player, enemy;

function startGame() {
  document.getElementById("menu").style.display = "none";
  canvas.style.display = "block";

  player = new Fighter(100, animals[selectedPlayer]);
  enemy = new Fighter(canvas.width - 150, animals[selectedEnemy]);

  gameLoop();
}

function playerControl() {
  if(keys['a']) player.vx = -5;
  else if(keys['d']) player.vx = 5;
  else player.vx *= 0.8;

  if(keys['w'] && player.onGround) {
    player.vy = -15;
    player.onGround = false;
  }

  // 回避（スペースキー）
  if(keys[' '] && player.dodgeTimer <= 0) {
    player.dodgeTimer = 20;
  }
}

function enemyAI() {
  if(player.x < enemy.x) enemy.vx = -2;
  else enemy.vx = 2;

  if(Math.abs(player.x - enemy.x) < 70 && Math.random() < 0.02) {
    enemy.attackTimer = 15;
    enemy.attackType = Math.random() < 0.5 ? "weak" : "strong";

    if(player.dodgeTimer <= 0) {
      player.hp -= enemy.attackType === "weak" ? 5 : 15;
      player.hitTimer = 10;
    }
  }
}

function playerAttack(type) {
  player.attackTimer = 15;
  player.attackType = type;

  if(Math.abs(player.x - enemy.x) < 70) {
    if(enemy.dodgeTimer <= 0) {
      enemy.hp -= type === "weak" ? 5 : 15;
      enemy.hitTimer = 10;
    }
  }
}

document.addEventListener("keydown", e => {
  if(e.key.toLowerCase() === 'f') playerAttack("weak");
  if(e.key.toLowerCase() === 'g') playerAttack("strong");
});

function drawHPBar(x,y,hp,label) {
  ctx.fillStyle = "gray";
  ctx.fillRect(x,y,300,20);
  ctx.fillStyle = "lime";
  ctx.fillRect(x,y,300 * (hp/100),20);
  ctx.fillStyle = "white";
  ctx.fillText(label, x, y-5);
}

function drawUI() {
  drawHPBar(50, canvas.height-60, player.hp, player.emoji + " " + player.name);
  drawHPBar(canvas.width-350, canvas.height-60, enemy.hp, enemy.emoji + " " + enemy.name);
}

function checkWin() {
  if(player.hp <= 0) {
    alert("負け！"); location.reload();
  }
  if(enemy.hp <= 0) {
    alert("勝ち！"); location.reload();
  }
}

function gameLoop() {
  ctx.clearRect(0,0,canvas.width,canvas.height);

  ctx.fillStyle = "green";
  ctx.fillRect(0, canvas.height-20, canvas.width, 20);

  playerControl();
  enemyAI();

  player.physics();
  enemy.physics();

  player.draw();
  enemy.draw();

  drawUI();
  checkWin();

  requestAnimationFrame(gameLoop);
}
</script>
</body>
</html>
