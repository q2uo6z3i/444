<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>Mini Smash Game 吹っ飛び＆落下版</title>
<style>
body { margin:0; overflow:hidden; background:#222; font-family:sans-serif; }
canvas { display:none; background:#87ceeb; }
#menu { color:white; text-align:center; padding-top:50px; }
#controls { position:absolute; top:10px; right:10px; color:white; }
button { margin:5px; padding:10px 20px; font-size:16px; }
</style>
</head>
<body>
<div id="menu">
  <h1>キャラクター選択</h1>
  <p>プレイヤーを選択</p>
  <div id="playerSelect"></div>
  <p>敵を選択</p>
  <div id="enemySelect"></div>
  <br>
  <button onclick="startGame()">ゲーム開始</button>
</div>

<div id="controls" style="display:none;">
操作:<br>
A/D 移動<br>
W ジャンプ<br>
F 弱攻撃<br>
G 強攻撃<br>
E 必殺技（吹っ飛ばす）<br>
Space 回避
</div>

<canvas id="game"></canvas>
<script>
const animals = [
  {name:"ネコ", emoji:"🐱"},
  {name:"イヌ", emoji:"🐶"},
  {name:"ウサギ", emoji:"🐰"},
  {name:"トラ", emoji:"🐯"},
  {name:"パンダ", emoji:"🐼"},
  {name:"キツネ", emoji:"🦊"},
  {name:"クマ", emoji:"🐻"},
  {name:"カエル", emoji:"🐸"},
  {name:"サル", emoji:"🐵"},
  {name:"ライオン", emoji:"🦁"}
];

let selectedPlayer = 0;
let selectedEnemy = 1;

const playerDiv = document.getElementById("playerSelect");
const enemyDiv = document.getElementById("enemySelect");

animals.forEach((a,i)=>{
  let b1 = document.createElement("button");
  b1.textContent = a.emoji + " " + a.name;
  b1.onclick = ()=> selectedPlayer = i;
  playerDiv.appendChild(b1);

  let b2 = document.createElement("button");
  b2.textContent = a.emoji + " " + a.name;
  b2.onclick = ()=> selectedEnemy = i;
  enemyDiv.appendChild(b2);
});

const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let keys = {};
document.addEventListener("keydown", e => keys[e.key.toLowerCase()] = true);
document.addEventListener("keyup", e => keys[e.key.toLowerCase()] = false);

class Fighter {
  constructor(x, data) {
    this.x = x;
    this.y = canvas.height - 100;
    this.vx = 0;
    this.vy = 0;
    this.size = 40;
    this.emoji = data.emoji;
    this.name = data.name;
    this.onGround = false;
    this.hp = 100;

    this.stamina = 100;
    this.maxStamina = 100;

    this.attackCount = 0;
    this.specialReady = false;
    this.dodgeCount = 3;
    this.dodgeTimer = 0;
    this.attackTimer = 0;
    this.attackType = "";
  }

  physics() {
    this.vy += 0.8;
    this.x += this.vx;
    this.y += this.vy;

    // 地面
    if(this.y + this.size > canvas.height - 20) {
      this.y = canvas.height - 20 - this.size;
      this.vy = 0;
      this.onGround = true;
    }

    if(this.attackTimer > 0) this.attackTimer--;
    if(this.dodgeTimer > 0) this.dodgeTimer--;

    // スタミナ回復
    this.stamina += 0.2;
    if(this.stamina > this.maxStamina) this.stamina = this.maxStamina;
  }

  draw() {
    ctx.font = "40px serif";
    ctx.globalAlpha = this.dodgeTimer > 0 ? 0.5 : 1;
    ctx.fillText(this.emoji, this.x, this.y);
    ctx.globalAlpha = 1;

    if(this.attackTimer > 0) {
      ctx.fillStyle = this.attackType === "special" ? "purple" : (this.attackType === "strong" ? "red" : "orange");
      ctx.fillRect(this.x + 30, this.y-30, 40, 20);
    }
  }
}

let player, enemy;

function startGame() {
  document.getElementById("menu").style.display = "none";
  document.getElementById("controls").style.display = "block";
  canvas.style.display = "block";

  player = new Fighter(100, animals[selectedPlayer]);
  enemy = new Fighter(canvas.width - 150, animals[selectedEnemy]);

  gameLoop();
}

function playerControl() {
  if(keys['a']) player.vx = -5;
  else if(keys['d']) player.vx = 5;
  else player.vx *= 0.8;

  if(keys['w'] && player.onGround) {
    player.vy = -15;
    player.onGround = false;
  }

  if(keys[' '] && player.dodgeTimer <= 0 && player.dodgeCount > 0 && player.stamina >= 10) {
    player.dodgeTimer = 20;
    player.dodgeCount--;
    player.stamina -= 10;
  }
}

function applyKnockback(target, sourceX) {
  let direction = target.x < sourceX ? -1 : 1;
  target.vx = 10 * direction;
  target.vy = -10;
}

function enemyAI() {
  if(player.x < enemy.x) enemy.vx = -2;
  else enemy.vx = 2;

  if(Math.random() < 0.01 && enemy.onGround) {
    enemy.vy = -12;
    enemy.onGround = false;
  }

  if(Math.random() < 0.01 && enemy.dodgeTimer <= 0 && enemy.dodgeCount > 0 && enemy.stamina >= 10) {
    enemy.dodgeTimer = 20;
    enemy.dodgeCount--;
    enemy.stamina -= 10;
  }

  if(Math.abs(player.x - enemy.x) < 70 && Math.random() < 0.02) {
    let type = Math.random() < 0.5 ? "weak" : "strong";
    let cost = type === "weak" ? 5 : 15;

    if(enemy.stamina >= cost) {
      enemy.attackTimer = 15;
      enemy.attackType = type;
      enemy.stamina -= cost;

      if(player.dodgeTimer <= 0) {
        player.hp -= type === "weak" ? 5 : 15;
      }

      enemy.attackCount++;
      if(enemy.attackCount >= 3) {
        enemy.specialReady = true;
        enemy.attackCount = 0;
      }
    }
  }

  // 必殺技（吹っ飛び）
  if(enemy.specialReady && enemy.stamina >= 30 && Math.random() < 0.01) {
    enemy.attackTimer = 20;
    enemy.attackType = "special";
    enemy.stamina -= 30;

    if(player.dodgeTimer <= 0) {
      player.hp -= 25;
      applyKnockback(player, enemy.x);
    }

    enemy.specialReady = false;
  }
}

function playerAttack(type) {
  let cost = type === "weak" ? 5 : 15;
  if(player.stamina < cost) return;

  player.attackTimer = 15;
  player.attackType = type;
  player.stamina -= cost;

  if(Math.abs(player.x - enemy.x) < 70) {
    if(enemy.dodgeTimer <= 0) {
      enemy.hp -= type === "weak" ? 5 : 15;
    }
  }

  player.attackCount++;
  if(player.attackCount >= 3) {
    player.specialReady = true;
    player.attackCount = 0;
  }
}

function specialAttack() {
  if(!player.specialReady || player.stamina < 30) return;

  player.attackTimer = 20;
  player.attackType = "special";
  player.stamina -= 30;

  if(Math.abs(player.x - enemy.x) < 80) {
    if(enemy.dodgeTimer <= 0) {
      enemy.hp -= 25;
      applyKnockback(enemy, player.x);
    }
  }

  player.specialReady = false;
}

document.addEventListener("keydown", e => {
  if(e.key.toLowerCase() === 'f') playerAttack("weak");
  if(e.key.toLowerCase() === 'g') playerAttack("strong");
  if(e.key.toLowerCase() === 'e') specialAttack();
});

function drawBar(x,y,value,max,color,label) {
  ctx.fillStyle = "gray";
  ctx.fillRect(x,y,300,15);
  ctx.fillStyle = color;
  ctx.fillRect(x,y,300 * (value/max),15);
  ctx.fillStyle = "white";
  ctx.fillText(label, x, y-5);
}

function drawUI() {
  drawBar(50, canvas.height-80, player.hp, 100, "lime", player.emoji + " HP");
  drawBar(50, canvas.height-55, player.stamina, 100, "cyan", "ST");

  drawBar(canvas.width-350, canvas.height-80, enemy.hp, 100, "lime", enemy.emoji + " HP");
  drawBar(canvas.width-350, canvas.height-55, enemy.stamina, 100, "cyan", "ST");

  ctx.fillStyle = "white";
  ctx.fillText(`必殺:${player.specialReady ? "OK" : "×"}`, 50, canvas.height-100);
}

function checkWin() {
  // 落下 or HP0
  if(player.hp <= 0 || player.y > canvas.height) {
    alert("負け！"); location.reload();
  }
  if(enemy.hp <= 0 || enemy.y > canvas.height) {
    alert("勝ち！"); location.reload();
  }
}

function gameLoop() {
  ctx.clearRect(0,0,canvas.width,canvas.height);

  ctx.fillStyle = "green";
  ctx.fillRect(0, canvas.height-20, canvas.width, 20);

  playerControl();
  enemyAI();

  player.physics();
  enemy.physics();

  player.draw();
  enemy.draw();

  drawUI();
  checkWin();

  requestAnimationFrame(gameLoop);
}
</script>
</body>
</html>
