<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>Mini Smash Game 改良版</title>
<style>
body { margin:0; overflow:hidden; background:#222; }
canvas { display:block; background:#87ceeb; }
#info {
  position:absolute; top:10px; left:10px; color:white; font-family:sans-serif;
}
</style>
</head>
<body>
<div id="info">A,D:移動 / W:ジャンプ / F:攻撃</div>
<canvas id="game"></canvas>
<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let keys = {};
document.addEventListener("keydown", e => keys[e.key.toLowerCase()] = true);
document.addEventListener("keyup", e => keys[e.key.toLowerCase()] = false);

class Player {
  constructor(x,color) {
    this.x = x;
    this.y = canvas.height - 100;
    this.vx = 0;
    this.vy = 0;
    this.width = 40;
    this.height = 60;
    this.color = color;
    this.onGround = false;
    this.hp = 100;
    this.hitTimer = 0;
    this.attackTimer = 0;
  }

  update() {
    if(keys['a']) this.vx = -5;
    else if(keys['d']) this.vx = 5;
    else this.vx *= 0.8;

    if(keys['w'] && this.onGround) {
      this.vy = -15;
      this.onGround = false;
    }

    this.vy += 0.8;
    this.x += this.vx;
    this.y += this.vy;

    if(this.y + this.height > canvas.height - 20) {
      this.y = canvas.height - 20 - this.height;
      this.vy = 0;
      this.onGround = true;
    }

    if(this.hitTimer > 0) this.hitTimer--;
    if(this.attackTimer > 0) this.attackTimer--;
  }

  draw() {
    ctx.fillStyle = this.hitTimer > 0 ? "yellow" : this.color;
    ctx.fillRect(this.x,this.y,this.width,this.height);

    if(this.attackTimer > 0) {
      ctx.fillStyle = "orange";
      ctx.fillRect(this.x + this.width, this.y+10, 20, 20);
    }
  }
}

class Enemy {
  constructor() {
    this.x = canvas.width - 100;
    this.y = canvas.height - 100;
    this.width = 40;
    this.height = 60;
    this.color = "red";
    this.vx = 2;
    this.hp = 100;
    this.hitTimer = 0;
  }

  update(player) {
    if(player.x < this.x) this.vx = -2;
    else this.vx = 2;

    this.x += this.vx;

    if(this.hitTimer > 0) this.hitTimer--;
  }

  draw() {
    ctx.fillStyle = this.hitTimer > 0 ? "yellow" : this.color;
    ctx.fillRect(this.x,this.y,this.width,this.height);
  }
}

const player = new Player(100,"blue");
const enemy = new Enemy();

function attack() {
  player.attackTimer = 10;
  let range = 60;
  if(Math.abs(player.x - enemy.x) < range) {
    enemy.hp -= 10;
    enemy.hitTimer = 10;
  }
}

document.addEventListener("keydown", e => {
  if(e.key.toLowerCase() === 'f') attack();
});

function drawUI() {
  ctx.fillStyle = "white";
  ctx.fillText("Player HP: " + player.hp, 20, 30);
  ctx.fillText("Enemy HP: " + enemy.hp, 20, 60);
}

function gameLoop() {
  ctx.clearRect(0,0,canvas.width,canvas.height);

  ctx.fillStyle = "green";
  ctx.fillRect(0, canvas.height-20, canvas.width, 20);

  player.update();
  enemy.update(player);

  player.draw();
  enemy.draw();

  drawUI();

  requestAnimationFrame(gameLoop);
}

gameLoop();
</script>
</body>
</html>
